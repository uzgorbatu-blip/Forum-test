<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil | Forum</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet"><script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#000000', secondary: '#FFFFFF', accent: '#E31E24' }, fontFamily: { sans: ['Inter', 'sans-serif'] }, } } }</script>
</head>
<body class="antialiased bg-gray-50">
    <script>if (!ForumDB.getSession()) window.location.href = 'login.html';</script>

    <div class="min-h-screen flex flex-col md:flex-row">
        <!-- Sidebar -->
        <aside class="w-full md:w-64 bg-black text-white flex flex-col fixed h-full z-20">
            <div class="p-8"><a href="../index.html" class="text-2xl font-black tracking-tighter block">FORUM<span class="text-accent">.</span></a></div>
            <nav class="flex-1 px-4 space-y-2 overflow-y-auto">
                <a href="dashboard.html" class="w-full text-left px-4 py-3 rounded-lg hover:bg-accent transition text-sm font-bold uppercase tracking-widest flex items-center"><i data-lucide="layout-dashboard" class="mr-3 w-4 h-4"></i> Panele Dön</a>
                <div class="pt-4 border-t border-gray-800 mt-4">
                    <p class="px-4 text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-2">Hızlı Erişim</p>
                    <a href="dashboard.html?tab=projeler" class="w-full text-left px-4 py-3 rounded-lg hover:bg-accent transition text-sm font-bold uppercase tracking-widest flex items-center text-gray-400"><i data-lucide="rocket" class="mr-3 w-4 h-4"></i> Projeler</a>
                    <a href="dashboard.html?tab=gorevler" class="w-full text-left px-4 py-3 rounded-lg hover:bg-accent transition text-sm font-bold uppercase tracking-widest flex items-center text-gray-400"><i data-lucide="check-square" class="mr-3 w-4 h-4"></i> Görevler</a>
                </div>
            </nav>
            <div class="p-4 border-t border-gray-800">
                <button onclick="ForumDB.logout()" class="w-full text-left px-4 py-3 rounded-lg hover:text-accent transition text-sm font-bold uppercase tracking-widest flex items-center text-gray-400"><i data-lucide="log-out" class="mr-3 w-4 h-4"></i> Çıkış</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 md:ml-64 p-4 md:p-12">
            <div class="max-w-6xl mx-auto">
                <!-- 1️⃣ Profil Header - Enhanced Modern Design -->
                <div class="relative mb-12" data-aos="fade-down">
                    <div class="h-48 w-full bg-gradient-to-r from-black to-gray-800 rounded-t-[3rem] shadow-lg"></div>
                    <div class="bg-white rounded-b-[3rem] px-8 pb-12 shadow-xl border-x border-b border-gray-100 -mt-12 relative">
                        <div class="flex flex-col md:flex-row items-center md:items-end md:space-x-8 -mt-16 md:-mt-20">
                            <div class="w-32 h-32 md:w-40 md:h-40 bg-black text-white rounded-full flex items-center justify-center text-5xl font-black shrink-0 border-8 border-white shadow-2xl z-10" id="profile-avatar">F</div>
                            <div class="flex-1 text-center md:text-left mt-6 md:mb-4">
                                <div class="flex flex-col md:flex-row md:items-center md:justify-between">
                                    <div>
                                        <h1 class="text-4xl font-black uppercase tracking-tighter" id="profile-name">İsim Soyisim</h1>
                                        <div class="flex items-center justify-center md:justify-start space-x-2 mt-1">
                                            <span class="bg-accent/10 text-accent font-black text-[10px] px-3 py-1 rounded-full uppercase tracking-widest" id="profile-role">Rol</span>
                                            <span class="text-gray-400 font-bold text-[10px] uppercase tracking-widest" id="profile-joined">Katılım: 2024</span>
                                        </div>
                                    </div>
                                    <div class="mt-6 md:mt-0 flex space-x-3 justify-center" id="profile-actions">
                                        <!-- Dynamic Actions -->
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Enhanced Stats -->
                        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mt-12 px-4">
                            <div class="flex flex-col items-center p-6 bg-black text-white rounded-3xl shadow-xl hover:scale-105 transition duration-300">
                                <p class="text-3xl font-black text-accent" id="profile-xp-level">Seviye 1</p>
                                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mt-1" id="profile-xp-title">Yeni Üye</p>
                            </div>
                            <div class="flex flex-col items-center p-6 bg-white rounded-3xl border border-gray-100 shadow-sm hover:scale-105 transition duration-300">
                                <p class="text-3xl font-black text-black" id="stat-xp">0</p>
                                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mt-1">Toplam XP</p>
                            </div>
                            <div class="flex flex-col items-center p-6 bg-white rounded-3xl border border-gray-100 shadow-sm hover:scale-105 transition duration-300">
                                <p class="text-3xl font-black text-black" id="stat-followers">0</p>
                                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mt-1">Takipçi</p>
                            </div>
                            <div class="flex flex-col items-center p-6 bg-white rounded-3xl border border-gray-100 shadow-sm hover:scale-105 transition duration-300">
                                <p class="text-3xl font-black text-black" id="stat-projects">0</p>
                                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mt-1">Proje</p>
                            </div>
                            <div class="flex flex-col items-center p-6 bg-white rounded-3xl border border-gray-100 shadow-sm hover:scale-105 transition duration-300">
                                <p class="text-3xl font-black text-black" id="stat-events">0</p>
                                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mt-1">Aktivite</p>
                            </div>
                        </div>

                        <!-- XP Progress Bar (Header) -->
                        <div class="mt-8 px-4 pb-4">
                            <div class="flex items-center justify-between mb-3">
                                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Sonraki Seviye İlerlemesi</p>
                                <p class="text-[10px] font-black text-accent uppercase tracking-widest" id="profile-xp-progress-text">0 / 0 XP</p>
                            </div>
                            <div class="w-full h-3 bg-gray-100 rounded-full overflow-hidden p-0.5">
                                <div id="profile-xp-progress-bar" class="h-full bg-accent rounded-full transition-all duration-1000" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid lg:grid-cols-3 gap-8">
                    <!-- 5️⃣ Profil Aktivite Bölümü -->
                    <div class="lg:col-span-2 space-y-8">
                        <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-gray-100" data-aos="fade-up">
                            <div class="flex items-center justify-between mb-8">
                                <h3 class="text-xl font-black uppercase tracking-tight flex items-center"><i data-lucide="activity" class="mr-3 text-accent w-6 h-6"></i> Son Aktiviteler</h3>
                                <div class="h-1 flex-1 bg-gray-50 mx-6 rounded-full"></div>
                            </div>
                            <div class="space-y-8 relative before:absolute before:left-[1.1rem] before:top-2 before:bottom-2 before:w-0.5 before:bg-gray-100" id="activity-feed">
                                <!-- Dynamic Activities -->
                            </div>
                        </div>
                    </div>

                    <!-- Side Info -->
                    <div class="space-y-8">
                        <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-gray-100" data-aos="fade-left">
                            <h3 class="text-xl font-black mb-6 uppercase tracking-tight">Hakkımda</h3>
                            <p class="text-gray-500 leading-relaxed text-sm" id="profile-bio">Kullanıcı henüz bir biyografi eklememiş.</p>
                            <div class="mt-8 pt-8 border-t border-gray-50">
                                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4">İlgi Alanları</p>
                                <div class="flex flex-wrap gap-2" id="profile-interests">
                                    <!-- Dynamic Interests -->
                                </div>
                            </div>
                        </div>

                        <div class="bg-black text-white p-10 rounded-[3rem] shadow-2xl overflow-hidden relative" data-aos="fade-left" data-aos-delay="100">
                            <div class="absolute top-0 right-0 w-32 h-32 bg-accent/10 rounded-full blur-3xl -mr-16 -mt-16"></div>
                            <h3 class="text-xl font-black mb-8 uppercase tracking-tight text-accent relative z-10">Komiteler</h3>
                            <div class="space-y-4 relative z-10" id="profile-committees">
                                <!-- Dynamic Committees -->
                            </div>
                        </div>

                        <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-gray-100" data-aos="fade-left" data-aos-delay="200">
                            <h3 class="text-xl font-black mb-8 uppercase tracking-tight">Rozetler</h3>
                            <div class="grid grid-cols-3 gap-4" id="profile-badges">
                                <!-- Dynamic Badges -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetUserId = urlParams.get('id');

        function loadProfile() {
            const users = ForumDB.getUsers();
            const session = ForumDB.getSession();
            const targetUser = targetUserId ? (users.find(u => Number(u.id) === Number(targetUserId)) || session) : session;
            const isOwnProfile = Number(targetUser.id) === Number(session.id);

            // UI Elements
            document.getElementById('profile-name').textContent = targetUser.fullName;
            document.getElementById('profile-avatar').textContent = targetUser.fullName.charAt(0);
            document.getElementById('profile-bio').textContent = targetUser.intro || 'Henüz bir biyografi eklenmemiş.';
            document.getElementById('profile-role').textContent = targetUser.role === 'admin' ? 'Site Yöneticisi' : (targetUser.role === 'committee_head' ? 'Komite Başkanı' : 'Üye');
            document.getElementById('profile-joined').textContent = `Katılım: ${new Date(targetUser.joinedAt).getFullYear()}`;
            
            // Stats
            document.getElementById('stat-followers').textContent = (targetUser.followers || []).length;
            document.getElementById('stat-projects').textContent = (targetUser.projects || []).length;
            document.getElementById('stat-events').textContent = (targetUser.activities || []).length;
            
            // XP Stats
            const xpInfo = ForumDB.getUserXPInfo(targetUser.id);
            document.getElementById('profile-xp-level').textContent = `Seviye ${xpInfo.level}`;
            document.getElementById('profile-xp-title').textContent = xpInfo.title;
            document.getElementById('stat-xp').textContent = xpInfo.xp;
            document.getElementById('profile-xp-progress-text').textContent = `${xpInfo.xp} / ${xpInfo.nextLevelXP || 'Max'} XP`;
            document.getElementById('profile-xp-progress-bar').style.width = `${xpInfo.progress}%`;

            // Interests
            const interestsDiv = document.getElementById('profile-interests');
            const interests = (targetUser.interests || '').split(',').map(i => i.trim()).filter(i => i);
            interestsDiv.innerHTML = interests.length === 0 ? '<p class="text-[10px] text-gray-400 italic">Henüz eklenmemiş.</p>' : 
                interests.map(i => `<span class="bg-gray-50 border border-gray-100 px-3 py-1 rounded-full text-[10px] font-bold text-gray-600">${i}</span>`).join('');

            // Badges
            const badgesInfo = ForumDB.getBadgesInfo();
            document.getElementById('profile-badges').innerHTML = (targetUser.badges || []).map(b => `
                <div class="group relative flex flex-col items-center">
                    <div class="bg-gray-50 p-3 rounded-2xl hover:bg-accent hover:text-white transition-all duration-300 cursor-help shadow-sm border border-gray-100">
                        <i data-lucide="${badgesInfo[b]?.icon || 'award'}" class="w-6 h-6"></i>
                    </div>
                    <span class="mt-2 text-[8px] font-black uppercase text-gray-400 text-center tracking-tighter">${badgesInfo[b]?.label || b}</span>
                </div>
            `).join('');

            // Actions (Follow/Edit)
            const actionsDiv = document.getElementById('profile-actions');
            if (isOwnProfile) {
                actionsDiv.innerHTML = `
                    <button class="bg-black text-white px-8 py-3 rounded-2xl font-black uppercase text-[10px] tracking-widest hover:bg-accent transition shadow-lg hover:scale-105 active:scale-95 duration-300">Ayarlar</button>
                    <button class="bg-white text-black border-2 border-black px-8 py-3 rounded-2xl font-black uppercase text-[10px] tracking-widest hover:bg-black hover:text-white transition shadow-lg duration-300">Paylaş</button>
                `;
            } else {
                const isFollowing = (session.following || []).some(id => Number(id) === Number(targetUser.id));
                actionsDiv.innerHTML = `
                    <button onclick="toggleFollow(${targetUser.id}, ${isFollowing})" class="${isFollowing ? 'bg-gray-100 text-black border border-gray-200' : 'bg-accent text-white'} px-10 py-3 rounded-2xl font-black uppercase text-[10px] tracking-widest hover:scale-105 transition shadow-xl active:scale-95 duration-300">
                        ${isFollowing ? 'Takibi Bırak' : 'Takip Et'}
                    </button>
                    <button class="bg-black text-white p-3 rounded-2xl hover:bg-accent transition shadow-xl duration-300"><i data-lucide="mail" class="w-5 h-5"></i></button>
                `;
            }

            // Activities
            const feed = document.getElementById('activity-feed');
            const activities = targetUser.activities || [];
            feed.innerHTML = activities.length === 0 ? '<p class="text-sm italic text-gray-400">Henüz bir aktivite yok.</p>' : activities.map(a => `
                <div class="flex items-start space-x-6 relative z-10 group">
                    <div class="w-9 h-9 bg-white border-2 border-gray-100 rounded-full flex items-center justify-center text-accent group-hover:border-accent transition duration-300 shrink-0">
                        <i data-lucide="${a.type === 'follow' ? 'user-plus' : (a.type === 'idea' ? 'lightbulb' : 'star')}" class="w-4 h-4"></i>
                    </div>
                    <div class="flex-1 pb-8 group-last:pb-0">
                        <p class="text-sm font-bold text-gray-800 leading-tight">${a.content}</p>
                        <p class="text-[9px] text-gray-400 font-black uppercase mt-2 tracking-widest flex items-center"><i data-lucide="clock" class="w-3 h-3 mr-1"></i> ${new Date(a.createdAt).toLocaleString()}</p>
                    </div>
                </div>
            `).join('');

            // Committees
            const committeeLabels = { bilim: 'Bilim ve Akademik', teknoloji: 'Teknoloji ve Girişim', sanat: 'Sanat ve Kültür', sosyal: 'Sosyal Sorumluluk', organizasyon: 'Organizasyon' };
            document.getElementById('profile-committees').innerHTML = (targetUser.committees || []).map(c => `
                <div class="flex items-center justify-between group cursor-pointer bg-white/5 p-4 rounded-2xl border border-white/5 hover:bg-white/10 transition duration-300">
                    <span class="text-xs font-black uppercase tracking-widest text-gray-300 group-hover:text-accent transition">${committeeLabels[c] || c}</span>
                    <i data-lucide="arrow-right" class="w-4 h-4 text-gray-600 group-hover:translate-x-1 transition"></i>
                </div>
            `).join('');

            lucide.createIcons();
            if (typeof AOS !== 'undefined') AOS.refresh();
        }

        function toggleFollow(id, isFollowing) {
            if (isFollowing) {
                ForumDB.unfollowUser(session.id, id);
            } else {
                ForumDB.followUser(session.id, id);
            }
            loadProfile();
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadProfile();
            AOS.init({ duration: 800, once: true });
        });
    </script>
</body></html>
