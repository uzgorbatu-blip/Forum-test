<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Forum</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet"><script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../assets/js/auth.js"></script><script src="../assets/js/main.js"></script>
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#000000', secondary: '#FFFFFF', accent: '#E31E24' }, fontFamily: { sans: ['Inter', 'sans-serif'] }, } } }</script>
</head>
<body class="antialiased">
    <nav class="fixed w-full z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex-shrink-0 flex items-center"><a href="../index.html" class="text-2xl font-extrabold tracking-tighter">FORUM<span class="text-accent">.</span></a></div>
                <div class="hidden md:flex space-x-8 text-sm font-semibold uppercase tracking-wider">
                    <a href="../index.html" class="hover:text-accent transition">Ana Sayfa</a>
                    <a href="hakkimizda.html" class="hover:text-accent transition">Hakkımızda</a>
                    <a href="komiteler.html" class="hover:text-accent transition">Komiteler</a>
                    <a href="projeler.html" class="hover:text-accent transition">Projeler</a>
                    <a href="etkinlikler.html" class="hover:text-accent transition">Etkinlikler</a>
                    <a href="iletisim.html" class="text-accent transition">İletişim</a>
                </div>
                <div class="hidden md:block" id="navbar-auth-links">
                    <div class="flex items-center space-x-4"><a href="login.html" class="text-sm font-bold uppercase tracking-widest hover:text-accent transition">Giriş</a><a href="register.html" class="bg-black text-white px-5 py-2.5 rounded-md hover:bg-accent transition text-sm font-bold uppercase tracking-widest">Kayıt</a></div>
                </div>
            </div>
        </div>
    </nav>
    <section class="pt-40 pb-20 bg-black text-white text-center" data-aos="fade-up">
        <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tighter uppercase">İletişim</h1>
        <p class="text-xl text-gray-400 max-w-3xl mx-auto leading-relaxed">Bir sorun mu var? Bize ulaşın!</p>
    </section>
    <section class="py-24 bg-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid md:grid-cols-2 gap-16">
                <div data-aos="fade-right">
                    <h2 class="text-3xl font-extrabold mb-8 uppercase tracking-tight">Bize Ulaşın</h2>
                    <div class="space-y-6">
                        <div class="flex items-center space-x-4"><i data-lucide="mail" class="text-accent"></i><span class="font-bold">iletisim@forum.org</span></div>
                        <div class="flex items-center space-x-4"><i data-lucide="map-pin" class="text-accent"></i><span class="font-bold">İstanbul, Türkiye</span></div>
                    </div>
                </div>
                <div data-aos="fade-left">
                    <form class="space-y-4">
                        <input placeholder="Ad Soyad" class="w-full px-4 py-3 border rounded-xl outline-none focus:border-accent">
                        <input placeholder="E-posta" class="w-full px-4 py-3 border rounded-xl outline-none focus:border-accent">
                        <textarea placeholder="Mesajınız..." class="w-full px-4 py-3 border rounded-xl outline-none focus:border-accent" rows="5"></textarea>
                        <button class="bg-black text-white px-8 py-3 rounded-xl font-bold uppercase tracking-widest text-xs hover:bg-accent transition w-full">Gönder</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
    <footer class="bg-black text-white py-12 text-center">
        <a href="../index.html" class="text-2xl font-black tracking-tighter mb-4 block">FORUM<span class="text-accent">.</span></a>
        <p class="text-gray-500 text-xs uppercase tracking-widest">&copy; 2024 Forum. Tüm Hakları Saklıdır.</p>
    </footer>
    <script>lucide.createIcons(); AOS.init({ duration: 800, once: true });</script>
